[hostname]
ssh_only = true
style = "fg:#090c0c bg:#a3aed2"
format = "[ $hostname ](fg:#090c0c bg:#a3aed2)"

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[cmd_duration]
min_time = 5000
format = 'пҗә [$duration]($style)'
